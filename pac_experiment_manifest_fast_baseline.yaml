# Provisional ASR Context (PAC) decoding experiments.
#
# Run all enabled experiments:
#   python3 scripts/run_pac_experiments.py
#
# Generate configs without running inference:
#   python3 scripts/run_pac_experiments.py --generate-only
#
# Re-score existing metrics and refresh the aggregate report:
#   python3 scripts/run_pac_experiments.py --score-only

output_root: output/pac_experiments_fast
directions: [en-de, en-fr, en-nl, en-pt, en-ru, en-tr]
#directions: [en-nl, en-ru, en-tr]
#directions: [en-de, en-fr, en-pt]
#directions: [en-de, en-fr]
