type: "agent_simulstream.CascadeSpeechProcessor"
speech_chunk_size: 0.96
latency_unit: "word"         # "char" for zh, "word" for de/it
detokenizer_type: "simuleval"
# MT (Qwen3.5; unified instruct/chat checkpoint — 4B default, 9B via speech_processor_qwen35_9b.yaml)
llm_model_name: "Qwen/Qwen3.5-4B"
llm_language_model_only: true  # vLLM: skip audio/video/image encoders; text-only MT
llm_enable_thinking: false   # required for translation; true emits "Thinking Process:" only
# llm_reasoning_parser: "qwen3"  # auto-set for Qwen3.5 when omitted
# llm_dtype: "fp16"              # float16 weights; default for 9B if omitted (see speech_processor_qwen35_9b.yaml)
# llm_quantization: "4bit"       # bitsandbytes 4-bit via vLLM (see *_bnb4.yaml presets)
# llm_enforce_eager: true        # required for 9B / bitsandbytes (see speech_processor_qwen35_9b.yaml)
llm_gpu_memory_utilization: 0.62
llm_max_model_len: 8192
# llm_base_url: "http://localhost:8000/v1"    # optional if using remote vLLM server
# Languages
source_lang: "English"
target_lang: "German"
# Startup / decoding
min_start_seconds: 1.0
max_new_tokens: 100
temperature: 0.0
top_p: 0.9
top_k: 20
repetition_penalty: 1.05
# Whisper-style MT fallbacks (segfreetk): zlib compression ratio + temperature ladder
temp_fall: true
compression_ratio_threshold: 2.4
iters_till_fallback: 4
fallback_word_rollback: 2
# MT emission policy (independent of ASR ``sfm_policy``)
mt_policy: "LCP"              # LCP / LACP / SLCP
mt_lacp_threshold: 2.0
mt_slcp_semantic_threshold: 0.65
mt_slcp_max_gap: 3
mt_slcp_use_spacy: false
# ASR (streaming_sfm + Parakeet)
sfm_pretrained_name: "nvidia/parakeet-tdt-0.6b-v3"
sfm_chunk_secs: 0.96
sfm_left_context_secs: 20.0
sfm_right_context_secs: 0.0
sfm_policy: "LACP"           # LCP / LACP / SLCP / WaitK / HoldN
sfm_lacp_threshold: 2.0
sfm_word_level: true
sfm_emit_incomplete: false
sfm_device: "cuda"
sfm_compute_dtype: "bfloat16"
sfm_decode: 1
